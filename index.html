<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>장산이 공략 정리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="container header-inner">
        <a href="#/" class="logo">
          <span class="logo-icon">⚔</span>
          <span class="logo-text">장산이 공략 정리</span>
        </a>
        <nav class="nav">
          <a href="#/" class="nav-link" data-route="/">공략 목록</a>
          <a href="#/library" class="nav-link" data-route="/library">외생기 라이브러리</a>
          <a href="#/links" class="nav-link" data-route="/links">기타 링크</a>
          <button id="nav-backup-btn" class="nav-backup-btn" style="display:none;" title="백업 / 복원">💾 백업</button>
          <button id="nav-help-btn" class="nav-help-btn" title="단축키 / 도움말" onclick="openShortcutHelp()">?</button>
        </nav>
      </div>
    </header>
    <main id="main" class="container main-content"></main>
    <footer class="footer">
      <div class="container">장산이 공략 정리</div>
    </footer>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box" onclick="event.stopPropagation()">
      <div id="modal-content"></div>
    </div>
  </div>

  <div id="preview-overlay" class="modal-overlay hidden" onclick="App.closePreview(event)">
    <div class="preview-box" onclick="event.stopPropagation()">
      <div class="preview-header">
        <span id="preview-title" class="modal-title"></span>
        <div style="display:flex;gap:8px;align-items:center;">
          <a id="preview-external" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-outline btn-sm">↗ 새 탭으로 열기</a>
          <button class="modal-close" onclick="App.closePreview()">×</button>
        </div>
      </div>
      <iframe id="preview-iframe" class="preview-iframe" src="about:blank"></iframe>
    </div>
  </div>

  <!-- JSZip: icons.zip을 브라우저에서 바로 압축 해제 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    window.__ICON_CACHE__ = {};
    window.__ICONS_READY__ = false;

    function _remapImages() {
      if (!window.__ICONS_READY__) return;
      document.querySelectorAll('img[src]').forEach(function(img) {
        var src = img.getAttribute('src');
        if (src && !src.startsWith('blob:') && window.__ICON_CACHE__[src]) {
          img.src = window.__ICON_CACHE__[src];
        }
      });
    }

    // 새로 추가되는 img 태그도 자동 처리
    var _iconObserver = new MutationObserver(function() {
      _remapImages();
    });

    fetch('icons.zip')
      .then(function(r) { return r.arrayBuffer(); })
      .then(function(buf) { return JSZip.loadAsync(buf); })
      .then(function(zip) {
        var promises = [];
        zip.forEach(function(path, file) {
          if (!file.dir) {
            promises.push(
              file.async('blob').then(function(blob) {
                window.__ICON_CACHE__[path] = URL.createObjectURL(blob);
              })
            );
          }
        });
        return Promise.all(promises);
      })
      .then(function() {
        window.__ICONS_READY__ = true;
        _remapImages();
        // 이후 DOM 변경에도 계속 적용
        _iconObserver.observe(document.body, { childList: true, subtree: true });
      })
      .catch(function(e) {
        console.warn('icons.zip 로드 실패, 로컬 경로로 대체합니다.', e);
      });
  </script>

  <script src="app.js"></script>
</body>
</html>
